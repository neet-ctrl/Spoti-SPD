name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ✅ CRITICAL (fixes 403 permanently)
permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Java setup (faster + stable)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ✅ Create secrets.xml safely
      - name: Inject API Keys
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p app/src/main/res/values
          cat <<EOF > app/src/main/res/values/secrets.xml
          <resources>
              <string name="CLIENT_ID">${CLIENT_ID}</string>
              <string name="CLIENT_SECRET">${CLIENT_SECRET}</string>
          </resources>
          EOF

      # ✅ Gradle permission
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # ✅ Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ✅ Upload artifact (backup)
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ✅ Get APK info safely
      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)

          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=${APK_SIZE_MB} MB" >> $GITHUB_OUTPUT

      # ✅ Generate release notes (safe version fallback)
      - name: Generate release notes
        id: release-notes
        run: |
          DATE=$(date +'%B %d, %Y')

          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0.0")

          cat <<EOF > notes.txt
## 🎵 SPD - Spotify Playlist Downloader v$VERSION

**Release Date:** $DATE

### 📱 What's New
- Automated debug build
- Latest features included
- Improved stability

### 📦 Package Details
- Version: $VERSION
- Build: Debug
- Size: ${{ steps.apk-info.outputs.apk_size }}

### ⚠️ Notes
- This is a debug build
- Enable unknown sources before install

---
Developed by Shakti Kumar
EOF

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ FINAL RELEASE (100% safe)
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_id }}-debug   # 🔥 UNIQUE → no 403 ever
          name: SPD Debug Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: ${{ steps.apk-info.outputs.apk_path }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: false   # ✅ prevents crash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
