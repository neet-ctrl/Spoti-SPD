name: Build and Release
on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Access Api keys
        env:
          clientId: ${{ secrets.CLIENT_ID }}
          clientSecret: ${{ secrets.CLIENT_SECRET }}
          path: app/src/main/res/values/secrets.xml
        run: |
          touch $path
          echo \<resources\> >> $path
          echo \<string name=\"CLIENT_ID\"\>$clientId\</string\> >> $path
          echo \<string name=\"CLIENT_SECRET\"\>$clientSecret\</string\> >> $path
          echo \</resources\> >> $path

      - name: Build Debug APK
        id: build
        run: bash ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spotify-playlist-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE_MB MB" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          # Get current date
          DATE=$(date +'%B %d, %Y')

          # Get version from build.gradle.kts
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

          # Create release body
          RELEASE_BODY="## 🎵 SPD - Spotify Playlist Downloader v$VERSION

          **Release Date:** $DATE

          ### 📱 What's New
          - Latest development build
          - Includes all recent features and improvements
          - Debug build for testing purposes

          ### 📦 Package Details
          - **Version:** $VERSION
          - **Build Type:** Debug
          - **File Size:** ${{ steps.apk-info.outputs.apk_size }}
          - **Platform:** Android 7.0+

          ### 🚀 Features
          - Download Spotify playlists, albums, and tracks
          - Built-in music player with full controls
          - Batch downloads and ZIP archives
          - Material 3 design with dark/light themes
          - MP3 conversion support

          ### ⚠️ Important Notes
          - This is a debug build intended for testing
          - Enable \"Install from Unknown Sources\" on your device
          - Grant storage permissions when prompted

          ### 📥 Installation
          1. Download the APK file below
          2. Enable installation from unknown sources
          3. Install and enjoy!

          ---
          **Developed by:** Shakti Kumar
          **Repository:** [GitHub](https://github.com/Shakti-ctrl/spoti)"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}-debug
          name: SPD Debug Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: |
            ${{ steps.apk-info.outputs.apk_path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
